<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fingate — Em Breve</title>
  <meta name="description" content="Fingate: a plataforma definitiva de inteligência financeira, orquestrando segurança, monitoramento e análise de risco para operações complexas em tempo real.">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green-bright: #48c9a2;
      --green-mid: #27a698;
      --dark-teal: #14494b;
      --dark-teal-deep: #11484b;
      --bg-dark: #0a2e30;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(72, 201, 162, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(72, 201, 162, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    /* Glowing orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      background: var(--green-bright);
      top: -150px;
      right: -100px;
      animation: float1 15s ease-in-out infinite;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: var(--green-mid);
      bottom: -100px;
      left: -100px;
      animation: float2 18s ease-in-out infinite;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: var(--dark-teal);
      top: 50%;
      left: 50%;
      animation: float3 12s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-40px, 40px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, -30px); }
    }

    @keyframes float3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.2); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 680px;
      width: 100%;
    }

    .logo-wrapper {
      margin-bottom: 3rem;
      animation: fadeInUp 1s ease-out;
    }

    .logo-wrapper svg {
      width: 240px;
      height: auto;
    }

    /* Override SVG dark fills to white for dark background */
    .logo-wrapper svg .cls-2,
    .logo-wrapper svg .cls-3 {
      fill: #ffffff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid rgba(72, 201, 162, 0.3);
      background: rgba(72, 201, 162, 0.08);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--green-bright);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      animation: fadeInUp 1s ease-out 0.2s both;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green-bright);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1.5rem;
      animation: fadeInUp 1s ease-out 0.4s both;
    }

    h1 span {
      background: linear-gradient(135deg, var(--green-bright), var(--green-mid));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .description {
      font-size: 1.1rem;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 300;
      margin-bottom: 3rem;
      animation: fadeInUp 1s ease-out 0.6s both;
    }

    .notify-form {
      display: flex;
      gap: 12px;
      max-width: 460px;
      margin: 0 auto 2rem;
      animation: fadeInUp 1s ease-out 0.8s both;
    }

    .notify-form input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid rgba(72, 201, 162, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .notify-form input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .notify-form input:focus {
      border-color: var(--green-bright);
      box-shadow: 0 0 0 3px rgba(72, 201, 162, 0.15);
    }

    .notify-form button {
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--green-bright), var(--green-mid));
      color: var(--bg-dark);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .notify-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(72, 201, 162, 0.3);
    }

    .notify-form button:active {
      transform: translateY(0);
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      animation: fadeInUp 1s ease-out 1s both;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.4);
    }

    .feature-icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: rgba(72, 201, 162, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-icon svg {
      width: 12px;
      height: 12px;
      stroke: var(--green-bright);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.25);
      z-index: 1;
    }

    @media (max-width: 560px) {
      .notify-form {
        flex-direction: column;
      }

      .features {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
    }
  </style>
</head>

    <h1>Inteligência financeira <span>em tempo real</span></h1>

    <p class="description">
      A plataforma definitiva que orquestra segurança, monitoramento e análise de risco
      para operações financeiras complexas.
    </p>

    <form class="notify-form" onsubmit="handleSubmit(event)">
      <input type="email" placeholder="Seu melhor e-mail" required aria-label="E-mail para notificação">
      <button type="submit">Avise-me</button>
    </form>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>

        </div>
        Monitoramento
      </div>
      <div class="feature">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        Análise de Risco
      </div>
    </div>

  <div class="footer">&copy; 2026 Fingate. Todos os direitos reservados.</div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const input = e.target.querySelector('input');
      const button = e.target.querySelector('button');
      const email = input.value;

      button.textContent = 'Registrado!';
      button.style.background = 'var(--green-mid)';
      input.value = '';
      input.disabled = true;
      button.disabled = true;

      setTimeout(() => {
        button.textContent = 'Avise-me';
        button.style.background = '';
        input.disabled = false;
        button.disabled = false;
      }, 3000);
    }
  </script>
